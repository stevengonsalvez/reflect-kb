[build-system]
requires = ["hatchling>=1.24"]
build-backend = "hatchling.build"

[project]
name = "reflect-kb"
version = "0.0.0"
description = "Universal cross-harness retrieval + learning KB for AI coding agents"
readme = "README.md"
license = { text = "MIT" }
requires-python = ">=3.11"
authors = [
    { name = "Steven Gonsalvez" },
]
keywords = [
    "ai",
    "agents",
    "claude-code",
    "codex",
    "copilot",
    "graphrag",
    "retrieval",
    "knowledge-base",
]
classifiers = [
    "Development Status :: 2 - Pre-Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development",
]
# Runtime deps intentionally empty at scaffold stage. Implementation PRs will
# add: click, pyyaml, jsonschema, sentence-transformers, nano-graphrag, qmd, etc.
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "ruff>=0.5",
    "mypy>=1.10",
]

[project.scripts]
reflect = "reflect_kb.cli:main"

[project.urls]
Homepage = "https://github.com/stevengonsalvez/reflect-kb"
Issues = "https://github.com/stevengonsalvez/reflect-kb/issues"
Specification = "https://github.com/stevengonsalvez/ai-coder-rules/blob/main/plans/reflect-v4-universal-install-spec.md"

[tool.hatch.build.targets.wheel]
packages = ["src/reflect_kb"]

[tool.ruff]
line-length = 100
target-version = "py311"
