name: ci

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on the same ref so a series of pushes doesn't pile up.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (${{ matrix.os }} / py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.11', '3.12']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: install package + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: run pytest
        run: pytest -q

  pipx-smoke:
    name: pipx smoke (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: install pipx
        run: python -m pip install --upgrade pip pipx
      - name: pipx install reflect-kb
        # `--force` so re-runs on cached venvs reinstall cleanly.
        run: pipx install --force .
      - name: ensure pipx bin on PATH
        run: |
          pipx ensurepath
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"
      - name: smoke — reflect --help
        # The reflect CLI exposes search/share/stats/etc. without optional
        # graph deps; --help guarantees the entry point resolves and the
        # click tree builds. This is the minimum viable signal that pipx
        # produced a working binary.
        run: reflect --help

  nix:
    name: nix (ubuntu-latest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v14
      - uses: DeterminateSystems/magic-nix-cache-action@v8
      - name: nix flake check
        # `--no-build` keeps this job under ~5 min by validating the flake
        # surface without running the full graphrag build, which the
        # `nix build` step covers.
        run: nix flake check --no-build
      - name: nix build .#reflect-kb
        run: nix build .#reflect-kb --print-build-logs
      - name: smoke — reflect --help via nix run
        run: nix run .#reflect-kb -- --help
